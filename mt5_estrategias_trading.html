
<style>
  .wrap { padding: 1rem 0; font-family: var(--font-sans); }
  .filtros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .btn-f { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; padding: 5px 14px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); transition: all 0.15s; }
  .btn-f:hover { background: var(--color-background-secondary); }
  .btn-f.active { background: #185FA5; border-color: #185FA5; color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
  .card:hover { border-color: var(--color-border-primary); }
  .card.hidden { display: none; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-bottom: 8px; font-weight: 500; }
  .tag-scalp { background: #FAECE7; color: #993C1D; }
  .tag-day { background: #E6F1FB; color: #185FA5; }
  .tag-swing { background: #E1F5EE; color: #0F6E56; }
  .tag-auto { background: #EEEDFE; color: #534AB7; }
  .card h3 { font-size: 15px; font-weight: 500; margin: 0 0 6px; color: var(--color-text-primary); }
  .card p { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 12px; line-height: 1.5; }
  .meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); }
  .stars { color: #EF9F27; font-size: 12px; }
  .detail { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-top: 1.5rem; display: none; }
  .detail.show { display: block; }
  .detail h2 { font-size: 17px; font-weight: 500; margin: 0 0 8px; color: var(--color-text-primary); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
  .dcard { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; }
  .dcard .label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .dcard .val { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .indicadores { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .ind { background: #EEEDFE; color: #534AB7; font-size: 12px; padding: 3px 10px; border-radius: 20px; }
  .close-btn { float: right; background: transparent; border: none; font-size: 18px; cursor: pointer; color: var(--color-text-secondary); margin-top: -4px; }
  .ask-btn { margin-top: 12px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 7px 14px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); }
  .ask-btn:hover { background: var(--color-background-secondary); }
  .bar-wrap { margin: 4px 0; }
  .bar-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 2px; }
  .bar { height: 6px; border-radius: 3px; background: var(--color-border-tertiary); overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
</style>

<div class="wrap">
  <h2 style="sr-only">Painel de estratégias para MT5</h2>
  <div class="filtros">
    <button class="btn-f active" onclick="filtrar('todos', this)">Todas</button>
    <button class="btn-f" onclick="filtrar('scalp', this)">Scalping</button>
    <button class="btn-f" onclick="filtrar('day', this)">Day Trade</button>
    <button class="btn-f" onclick="filtrar('swing', this)">Swing Trade</button>
    <button class="btn-f" onclick="filtrar('auto', this)">Automatizada (EA)</button>
  </div>

  <div class="grid" id="grid"></div>
  <div class="detail" id="detail"></div>
</div>

function renderStars(n) {
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function renderBar(val, color) {
  return `<div class="bar"><div class="bar-fill" style="width:${val*20}%;background:${color}"></div></div>`;
}

function filtrar(tipo, btn) {
  document.querySelectorAll('.btn-f').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(c => {
    if (tipo === 'todos' || c.dataset.tipo === tipo) c.classList.remove('hidden');
    else c.classList.add('hidden');
  });
  document.getElementById('detail').classList.remove('show');
}

function mostrarDetalhe(idx) {
  const e = estrategias[idx];
  const d = document.getElementById('detail');
  d.innerHTML = `
    <button class="close-btn" onclick="document.getElementById('detail').classList.remove('show')">✕</button>
    <h2>${e.nome}</h2>
    <p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 12px">${e.pros} <span style="color:var(--color-text-tertiary)">— ${e.contras}</span></p>
    <div class="detail-grid">
      <div class="dcard"><div class="label">Timeframe</div><div class="val">${e.timeframe}</div></div>
      <div class="dcard"><div class="label">Tempo na tela</div><div class="val">${e.tempo}</div></div>
      <div class="dcard"><div class="label">Win rate estimado</div><div class="val">${e.winrate}</div></div>
      <div class="dcard"><div class="label">Relação risco/retorno</div><div class="val">${e.rr}</div></div>
    </div>
    <div style="margin:10px 0">
      <div class="bar-label">Dificuldade</div>
      ${renderBar(e.dificuldade, '#185FA5')}
      <div class="bar-label" style="margin-top:8px">Risco</div>
      ${renderBar(e.risco, '#D85A30')}
    </div>
    <div class="indicadores">${e.indicadores.map(i => `<span class="ind">${i}</span>`).join('')}</div>
    <button class="ask-btn" onclick="sendPrompt('Me explica melhor a estratégia ${e.nome} para o MT5, com setup detalhado e gerenciamento de risco') ">Quero saber mais sobre essa estratégia ↗</button>
  `;
  d.classList.add('show');
  d.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

const grid = document.getElementById('grid');
estrategias.forEach((e, i) => {
  grid.innerHTML += `
    <div class="card" data-tipo="${e.tipo}" onclick="mostrarDetalhe(${i})">
      <span class="tag ${e.tagClass}">${e.tag}</span>
      <h3>${e.nome}</h3>
      <p>${e.desc}</p>
      <div class="meta">
        <span class="pill">${e.timeframe}</span>
        <span class="pill">${e.tempo}</span>
        <span class="pill stars">${renderStars(e.dificuldade)}</span>
      </div>
    </div>`;
});
</script>
